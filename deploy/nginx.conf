# ============================================
# Configuração Nginx - SolarZ Finance
# Para Easypanel / VPS
# SSL já configurado pelo Easypanel
# ============================================

server {
    listen 80;
    server_name solarz-eventos.yeixie.easypanel.host;

    root /var/www/solarz-finance/frontend/dist;
    index index.html;

    # Cache de arquivos estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # SPA routing - todas as rotas para index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy para Backend API (FastAPI na porta 8000)
    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Health check
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    access_log /var/log/nginx/solarz-finance-access.log;
    error_log /var/log/nginx/solarz-finance-error.log;
}
