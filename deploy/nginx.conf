# ============================================
# Configuração Nginx - SolarZ Finance
# ============================================

# Frontend (React SPA)
server {
    listen 80;
    server_name financeiro.seudominio.com;

    # Redirect para HTTPS (descomente após configurar SSL)
    # return 301 https://$server_name$request_uri;

    root /var/www/galaxy-finance/frontend/dist;
    index index.html;

    # Cache de arquivos estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # SPA routing - todas as rotas para index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Logs
    access_log /var/log/nginx/galaxy-finance-access.log;
    error_log /var/log/nginx/galaxy-finance-error.log;
}

